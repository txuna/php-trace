services:
  php-fpm:
    build:
      context: ../../php-fpm
      dockerfile: Dockerfile
    environment:
      USE_ZEND_DTRACE: "1"
    volumes:
      - ../../app:/var/www/html:ro
      - php-bin:/usr/local/sbin

  nginx:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ../../app:/var/www/html:ro
      - ../../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php-fpm

  tracer:
    build:
      context: ../../bpftrace
    privileged: true
    depends_on:
      - php-fpm
    volumes:
      - php-bin:/usr/local/sbin   # php-fpm과 동일 inode → uprobe 동작
      - ./scripts:/scripts
      - /sys/kernel/debug:/sys/kernel/debug:rw
      - /sys/kernel/tracing:/sys/kernel/tracing:rw
      - /sys/fs/bpf:/sys/fs/bpf:rw
    command: /bin/bash
    stdin_open: true
    tty: true

volumes:
  php-bin:
