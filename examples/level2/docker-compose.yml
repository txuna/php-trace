services:
  tracer:
    build:
      context: ../..          # 프로젝트 루트 (bpftrace/ 포함)
      dockerfile: bpftrace/Dockerfile
    privileged: true
    volumes:
      - ./scripts:/scripts
      - /sys/kernel/debug:/sys/kernel/debug:rw
      - /sys/kernel/tracing:/sys/kernel/tracing:rw
      - /sys/fs/bpf:/sys/fs/bpf:rw
    command: /bin/bash
    stdin_open: true
    tty: true

  shell:
    image: ubuntu:24.04
    command: sleep infinity
    stdin_open: true
    tty: true
