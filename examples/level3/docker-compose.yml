services:
  php-fpm:
    image: php:8.4.7-fpm
    environment:
      USE_ZEND_DTRACE: "1"
    volumes:
      - ../../app:/var/www/html:ro

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ../../app:/var/www/html:ro
      - ../../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php-fpm

  bpftrace:
    build:
      context: ../../bpftrace
    # Share PID namespace with php-fpm so bpftrace can see its processes and USDT probes
    pid: "service:php-fpm"
    privileged: true
    volumes:
      - /sys/kernel/debug:/sys/kernel/debug:ro
      - /sys/kernel/tracing:/sys/kernel/tracing:ro
      - ./scripts:/scripts
    depends_on:
      - php-fpm
    stdin_open: true
    tty: true
